<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav>
        <h1>🎓 Placement Cell</h1>
        <div>
            <a href="/student/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>My Profile ✏️</h2>

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" autocomplete="off">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ student.name }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="{{ student.email }}" disabled>
            </div>
            <div class="form-group">
                <label>Branch</label>
                <input type="text" name="branch" value="{{ student.branch }}">
            </div>
            <div class="form-group">
                <label>CGPA</label>
                <input type="number" name="cgpa" step="0.01" min="0" max="10" value="{{ student.cgpa }}">
            </div>
            <div class="form-group">
                <label>Skills</label>
                <input type="text" name="skills" value="{{ student.skills }}" placeholder="e.g. Python, SQL, Flask">
            </div>
            <button type="submit" class="btn">Update Profile</button>
        </form>
    </div>

</body>
</html>
