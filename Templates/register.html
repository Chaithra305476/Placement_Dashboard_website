<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav>
        <h1>🎓 Placement Cell</h1>
        <div>
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Register</h2>

        <form method="POST">
            <div class="form-group">
                <label>Register As</label>
                <select name="role" id="role" onchange="toggleFields()">
                    <option value="student">Student</option>
                    <option value="company">Company</option>
                </select>
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Student Fields -->
            <div id="student-fields">
                <div class="form-group">
                    <label>Branch</label>
                    <input type="text" name="branch" placeholder="e.g. CSE, ECE, ISE">
                </div>
                <div class="form-group">
                    <label>CGPA</label>
                    <input type="number" name="cgpa" step="0.01" min="0" max="10" placeholder="e.g. 8.5">
                </div>
                <div class="form-group">
                    <label>Skills</label>
                    <input type="text" name="skills" placeholder="e.g. Python, SQL, Flask">
                </div>
            </div>

            <!-- Company Fields -->
            <div id="company-fields" style="display:none;">
                <div class="form-group">
                    <label>Industry</label>
                    <input type="text" name="industry" placeholder="e.g. IT, Finance, Healthcare">
                </div>
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <p class="form-footer">Already have an account? <a href="/login">Login here</a></p>
    </div>

    <script>
        function toggleFields() {
            const role = document.getElementById('role').value;
            document.getElementById('student-fields').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('company-fields').style.display = role === 'company' ? 'block' : 'none';
        }
    </script>

</body>
</html>
